<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>שירים מלאים - בובו פפה</title>
    <link rel="stylesheet" href="שירים מלאים.css">
    <link href="https://fonts.googleapis.com/css2?family=Secular+One&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="container">
            <img src="Screenshot 2026-03-14 135433.png" alt="לוגו" class="logo">
            <h1>שירים מלאים</h1>
            <p>כל השירים האהובים במקום אחד</p>
        </div>
    </header>

    <nav>
        <a href="Cataction.html" class="logo-link">
            <img src="Screenshot 2026-03-14 135433.png" alt="לוגו" class="logo-img">
        </a>
        <a href="Cataction.html" class="nav-link">חזור לדף הבית</a>
        <a href="שירים מלאים.html" class="active">שירים מלאים</a>
        <a href="סרטים.html">סרטים</a>
        <a href="מופעים.html">מופעים</a>
        <a href="שיתופי פעולה.html">שיתופי פעולה</a>
    </nav>

    <main>
        <div class="container">
            <h2>הפלייליסט שלנו</h2>
            <div class="song-grid">
                <!-- Song Card 1 -->
                <div class="song-card">
                    <img src="Album.png" alt="שיר 1" class="song-cover">
                    <h3>All of the ways</h3>
                    <p>BOBO FFA</p>
                    <button class="play-button">נגן</button>
                    <audio id="audio1" src="All of the ways.mp3">
                        Your browser does not support the audio element.
                    </audio>
                </div>
                <!-- Song Card 2 -->
                <div class="song-card">
                    <img src="Album.png" alt="שיר 2" class="song-cover">
                    <h3>Music for Tourism</h3>
                    <p>BOBO FFA</p>
                    <button class="play-button">נגן</button>
                    <audio id="audio2" src="Music for Tourism.mp3">
                        Your browser does not support the audio element.
                    </audio>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Bobo FFA - All Cats Reserved</p>
        </div>
    </footer>

    <script>
        document.querySelectorAll('.play-button').forEach(button => {
            button.addEventListener('click', () => {
                const audio = button.parentElement.querySelector('audio');
                
                if (audio.paused) {
                    // Stop any other song that might be playing
                    document.querySelectorAll('audio').forEach(a => {
                        a.pause();
                        a.parentElement.querySelector('.play-button').textContent = 'נגן';
                    });

                    audio.play();
                    button.textContent = 'השהה'; // Change to "Pause"
                } else {
                    audio.pause();
                    button.textContent = 'נגן'; // Change back to "Play"
                }
            });
        });
    </script>
</body>
</html>
