    </div class= "Clock container">
    Current Time: <span id="live-clock"></span>
    <span id="hrs00">00</span>
    <span>:</span>
    <span id="min00">00</span>
    <span>:</span>
    <span id="sec00">00</span>
    </div>
    <script>
        let hrs = document.getElementById("hrs00");
        let min = document.getElementById("min00");
        let sec = document.getElementById("sec00");

        function updateClock() {
            let currentTime = new Date();
            hrs.innerHTML = currentTime.getHours() < 10 ? '0' + currentTime.getHours() :
            currentTime.getHours();
            min.innerHTML = currentTime.getMinutes() < 10 ? '0' + currentTime.getMinutes() :
            currentTime.getMinutes();
            sec.innerHTML = currentTime.getSeconds() < 10 ? '0' + currentTime.getSeconds() : 
            currentTime.getSeconds();
        }

        updateClock();
        setInterval(updateClock, 1000);
    </script>

    <script>
        document.querySelectorAll('.play-button').forEach(button => {
            button.addEventListener('click', () => {
                const audio = button.parentElement.querySelector('audio');
                
                if (audio.paused) {
                    // Stop any other song that might be playing
                    document.querySelectorAll('audio').forEach(a => {
                        a.pause();
                        a.parentElement.querySelector('.play-button').textContent = 'נגן';
                    });

                    audio.play();
                    button.textContent = 'השהה'; // Change to "Pause"
                } else {
                    audio.pause();
                    button.textContent = 'נגן'; // Change back to "Play"
                }
            });
        });
    </script>
